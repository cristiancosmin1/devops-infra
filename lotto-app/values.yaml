replicaCount: 2

image:
  repository: cristiancosmin/devops-app
  tag: "1.0"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8000

postgres:
  image: postgres:16
  db: appdb
  user: appuser
  password: apppass

ingress:
  enabled: true
  host: app.local
  className: nginx

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
