apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lotto-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cristiancosmin1/devops-infra.git
    targetRevision: main
    path: lotto-app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
